<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Git History Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #09141f;
      --panel: #102132;
      --panel-soft: #132a40;
      --text: #eaf2f8;
      --muted: #9db3c7;
      --accent: #ff7a18;
      --accent-2: #00c2a8;
      --danger: #ff4d6d;
      --line: #1f3a52;
      --shadow: 0 20px 45px rgba(0, 0, 0, 0.28);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
    }

    body {
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at 85% 10%, rgba(0, 194, 168, 0.12), transparent 38%),
        radial-gradient(circle at 12% 18%, rgba(255, 122, 24, 0.16), transparent 36%),
        linear-gradient(140deg, #07101a 0%, #0b1a2a 50%, #09141f 100%);
      font-family: "Space Grotesk", "Avenir Next", "Segoe UI", sans-serif;
      min-height: 100vh;
    }

    .wrap {
      width: 100%;
      max-width: none;
      margin: 0;
      padding: 22px clamp(10px, 1.2vw, 18px) 30px;
      display: grid;
      gap: 16px;
    }

    .hero, .panel {
      background: linear-gradient(160deg, rgba(19, 42, 64, 0.92), rgba(16, 33, 50, 0.92));
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 18px;
      animation: rise .55s ease both;
      min-width: 0;
      width: 100%;
    }

    .hero h1 {
      margin: 0 0 6px;
      font-size: clamp(1.4rem, 2.7vw, 2rem);
      letter-spacing: .02em;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 12px;
      align-items: end;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: .88rem;
      min-width: 0;
      width: 100%;
    }

    select, button {
      width: 100%;
      max-width: 100%;
      height: 40px;
      border-radius: 10px;
      border: 1px solid #33536e;
      background: #0b1c2c;
      color: var(--text);
      padding: 0 10px;
      font: inherit;
      min-width: 0;
    }

    select {
      text-overflow: ellipsis;
      white-space: nowrap;
      overflow: hidden;
    }

    button {
      background: linear-gradient(130deg, var(--accent), #ff9c4a);
      border: none;
      color: #09141f;
      font-weight: 700;
      cursor: pointer;
    }

    .file-label { width: 100%; }
    .file-input { display: none; }
    .file-picker {
      height: 40px;
      border-radius: 10px;
      border: 1px solid #33536e;
      background: #0b1c2c;
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 8px;
      padding: 4px 8px;
      min-width: 0;
    }
    .file-btn {
      height: 30px;
      border: 0;
      border-radius: 8px;
      background: linear-gradient(130deg, #1a3348, #254966);
      color: #d9e8f5;
      padding: 0 10px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    .file-name {
      color: var(--muted);
      font-size: .86rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 10px;
    }

    .stat {
      background: rgba(9, 20, 31, 0.45);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
    }

    .stat .k { color: var(--muted); font-size: .82rem; }
    .stat .v { font-size: 1.45rem; font-weight: 700; margin-top: 2px; }

    .grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 16px;
      align-items: stretch;
      min-width: 0;
    }

    .chart-panel {
      min-width: 0;
      overflow: hidden;
      display: grid;
      gap: 10px;
      align-content: start;
    }
    .chart-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-width: 0;
    }
    .chart-wrap {
      position: relative;
      width: 100%;
      height: 340px;
      min-width: 0;
    }
    .chart {
      width: 100% !important;
      height: 100% !important;
      max-width: 100%;
      min-width: 0;
      display: block;
    }
    .chart.zoomable { cursor: crosshair; }
    .chart-wrap.small { height: 300px; }
    .chart-hint {
      flex: 1 1 auto;
      color: var(--muted);
      font-size: .84rem;
      min-height: 1.2em;
      min-width: 0;
    }
    .icon-btn {
      width: 40px;
      height: 40px;
      min-width: 40px;
      padding: 0;
      display: inline-grid;
      place-items: center;
      border: 1px solid #33536e;
      background: #0b1c2c;
      color: var(--text);
      flex: 0 0 auto;
    }
    .icon-btn svg {
      width: 18px;
      height: 18px;
      display: block;
    }
    .icon-btn:disabled {
      opacity: 0.45;
      cursor: default;
    }

    @media (max-width: 950px) {
      .grid { grid-template-columns: 1fr; }
      .chart-wrap.small { height: 320px; }
    }

    @media (max-width: 640px) {
      .controls { grid-template-columns: 1fr; }
      .hero, .panel { padding: 14px; border-radius: 14px; }
      .chart-wrap { height: 280px; }
      .chart-wrap.small { height: 260px; }
      .wrap { padding-left: 8px; padding-right: 8px; }
    }

    @keyframes rise {
      from { transform: translateY(10px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>Git History Activity Dashboard</h1>
      <p>Daily/weekly/monthly movement across repositories</p>
    </section>

    <section class="panel controls">
      <label>Repository
        <select id="repoSelect"></select>
      </label>
      <label>Metric
        <select id="metricSelect">
          <option value="modified_lines">Modified (Added + Removed)</option>
          <option value="added_lines">Added</option>
          <option value="removed_lines">Removed</option>
          <option value="net_change_lines">Net Change</option>
          <option value="approx_total_loc">Approx Total LOC</option>
          <option value="commits" selected>Commits</option>
          <option value="moved_lines_approx">Moved (Approx)</option>
        </select>
      </label>
      <label>Granularity
        <select id="granularitySelect">
          <option value="auto">Auto</option>
          <option value="day">Day</option>
          <option value="week">Week</option>
          <option value="month">Month</option>
        </select>
      </label>
      <label class="file-label">Load CSV
        <input class="file-input" id="fileInput" type="file" accept=".csv,text/csv" />
        <div class="file-picker">
          <button class="file-btn" id="pickFileBtn" type="button">Upload CSV</button>
          <span class="file-name" id="fileName">all_repos_daily_stats.csv</span>
        </div>
      </label>
    </section>

    <section class="panel stats" id="stats"></section>

    <section class="grid">
      <section class="panel chart-panel">
        <div class="chart-head">
          <div class="chart-hint" id="rangeHint"></div>
          <button class="icon-btn" id="resetZoom" type="button" aria-label="Reset time range" title="Reset time range">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 5a7 7 0 1 1-6.3 4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
              <path d="M5 5v4h4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
          </button>
        </div>
        <div class="chart-wrap">
          <canvas id="trendChart" class="chart zoomable"></canvas>
        </div>
      </section>
      <section class="panel chart-panel">
        <div class="chart-wrap small">
          <canvas id="repoChart" class="chart"></canvas>
        </div>
      </section>
    </section>

  </main>

  <script>
    const state = {
      rows: [],
      trendChart: null,
      repoChart: null,
      view: { repo: "ALL", metric: "commits", granularity: "auto", zoomRange: null },
      dragSelection: { active: false, startX: 0, currentX: 0 }
    };

    const numKeys = ["commits", "added_lines", "removed_lines", "modified_lines", "moved_lines_approx", "net_change_lines"];

    const fmt = new Intl.NumberFormat("en-US");
    const dayFmt = new Intl.DateTimeFormat("en-US", { month: "short", day: "numeric", year: "numeric" });
    const monthFmt = new Intl.DateTimeFormat("en-US", { month: "short", year: "numeric" });
    const metricLabels = {
      commits: "Commits",
      added_lines: "Added Lines",
      removed_lines: "Removed Lines",
      modified_lines: "Modified Lines",
      moved_lines_approx: "Moved Lines (Approx)",
      net_change_lines: "Net Change",
      approx_total_loc: "Approx Total LOC"
    };

    function metricLabel(metric) {
      return metricLabels[metric] || metric;
    }

    function formatBucketLabel(dateStr, granularity) {
      if (!granularity) return dateStr;
      const date = new Date(dateStr + "T00:00:00");
      if (Number.isNaN(date.getTime())) return dateStr;
      if (granularity === "month") return monthFmt.format(date);
      if (granularity === "week") return `Week of ${dayFmt.format(date)}`;
      return dayFmt.format(date);
    }

    function buildTooltipOptions({ granularity = null, valueAxis = "y", titleFormatter = null } = {}) {
      return {
        backgroundColor: "rgba(7, 16, 26, 0.96)",
        borderColor: "#33536e",
        borderWidth: 1,
        cornerRadius: 12,
        padding: 12,
        titleColor: "#eaf2f8",
        bodyColor: "#c5d7e6",
        displayColors: true,
        usePointStyle: true,
        caretPadding: 10,
        callbacks: {
          title(items) {
            if (!items.length) return "";
            return titleFormatter ? titleFormatter(items[0]) : formatBucketLabel(items[0].label, granularity);
          },
          label(context) {
            const parsed = typeof context.parsed === "number" ? context.parsed : context.parsed?.[valueAxis];
            return `${context.dataset.label}: ${fmt.format(parsed ?? 0)}`;
          }
        }
      };
    }

    function bucketKey(dateStr, granularity) {
      if (granularity === "week") return startOfWeek(dateStr);
      if (granularity === "month") return toMonth(dateStr);
      return dateStr;
    }

    function clearDragSelection(chart = state.trendChart) {
      if (!state.dragSelection.active && state.dragSelection.startX === 0 && state.dragSelection.currentX === 0) return;
      state.dragSelection.active = false;
      state.dragSelection.startX = 0;
      state.dragSelection.currentX = 0;
      chart?.draw();
    }

    function clearZoomRange(render = true) {
      if (!state.view.zoomRange) return;
      state.view.zoomRange = null;
      if (render) renderCharts();
    }

    function updateRangeHint(granularity, series) {
      const hint = document.getElementById("rangeHint");
      const resetBtn = document.getElementById("resetZoom");
      if (!hint) return;
      if (resetBtn) resetBtn.disabled = !state.view.zoomRange;
      if (!series.length) {
        hint.textContent = "Load data to explore the timeline.";
        return;
      }
      if (!state.view.zoomRange) {
        hint.textContent = "Drag on the trend chart to zoom. Double-click the chart to return to the full range.";
        return;
      }
      const start = formatBucketLabel(state.view.zoomRange.start, granularity);
      const end = formatBucketLabel(state.view.zoomRange.end, granularity);
      hint.textContent = `Zoomed to ${start} to ${end}. Double-click the chart to reset the range.`;
    }

    const trendSelectionPlugin = {
      id: "trendSelection",
      afterDatasetsDraw(chart) {
        if (chart.canvas.id !== "trendChart" || !state.dragSelection.active) return;
        const { left, right, top, bottom } = chart.chartArea || {};
        if (left === undefined) return;
        const startX = Math.max(left, Math.min(right, state.dragSelection.startX));
        const currentX = Math.max(left, Math.min(right, state.dragSelection.currentX));
        const x = Math.min(startX, currentX);
        const width = Math.abs(currentX - startX);
        if (width < 2) return;

        const ctx = chart.ctx;
        ctx.save();
        ctx.fillStyle = "rgba(0, 194, 168, 0.16)";
        ctx.strokeStyle = "rgba(0, 194, 168, 0.75)";
        ctx.lineWidth = 1;
        ctx.fillRect(x, top, width, bottom - top);
        ctx.strokeRect(x, top, width, bottom - top);
        ctx.restore();
      }
    };

    Chart.register(trendSelectionPlugin);

    function resetTimeRange() {
      clearDragSelection();
      clearZoomRange();
    }

    function parseCsv(text) {
      const lines = text.trim().split(/\r?\n/).filter(Boolean);
      if (lines.length < 2) return [];
      const headers = lines[0].split(",").map(s => s.trim());
      const idx = Object.fromEntries(headers.map((h, i) => [h, i]));
      const need = ["repo", "date", ...numKeys];
      const missing = need.filter(k => idx[k] === undefined);
      if (missing.length) throw new Error("Missing columns: " + missing.join(", "));
      return lines.slice(1).map(line => {
        const parts = line.split(",");
        const row = { repo: parts[idx.repo], date: parts[idx.date] };
        for (const k of numKeys) row[k] = Number(parts[idx[k]] || 0);
        return row;
      });
    }

    function startOfWeek(dateStr) {
      const d = new Date(dateStr + "T00:00:00");
      const day = (d.getDay() + 6) % 7;
      d.setDate(d.getDate() - day);
      return d.toISOString().slice(0, 10);
    }

    function toMonth(dateStr) {
      return dateStr.slice(0, 7) + "-01";
    }

    function aggregate(rows, granularity) {
      const map = new Map();
      for (const r of rows) {
        let key = r.date;
        if (granularity === "week") key = startOfWeek(r.date);
        if (granularity === "month") key = toMonth(r.date);
        if (!map.has(key)) map.set(key, { date: key, commits: 0, added_lines: 0, removed_lines: 0, modified_lines: 0, moved_lines_approx: 0, net_change_lines: 0 });
        const acc = map.get(key);
        for (const k of numKeys) acc[k] += r[k];
      }
      return [...map.values()].sort((a, b) => a.date.localeCompare(b.date));
    }

    function pickGranularity(rows, selected) {
      if (selected !== "auto") return selected;
      const dayCount = new Set(rows.map(r => r.date)).size;
      if (dayCount > 1000) return "month";
      if (dayCount > 320) return "week";
      return "day";
    }

    function updateRepoOptions() {
      const select = document.getElementById("repoSelect");
      const repos = [...new Set(state.rows.map(r => r.repo))].sort();
      select.innerHTML = `<option value="ALL">All Repos</option>` + repos.map(r => `<option value="${r}">${r.replace("https://github.com/", "")}</option>`).join("");
      if (!["ALL", ...repos].includes(state.view.repo)) state.view.repo = "ALL";
      select.value = state.view.repo;
    }

    function cumulativeApproxLoc(rows) {
      let total = 0;
      return rows.map(r => {
        total += r.net_change_lines;
        return total;
      });
    }

    function bindTrendZoom(chart, labels) {
      const canvas = chart.canvas;
      if (!canvas) return;

      canvas.style.touchAction = "none";

      const chartAreaContains = (clientX, clientY) => {
        const rect = canvas.getBoundingClientRect();
        const x = clientX - rect.left;
        const y = clientY - rect.top;
        const area = chart.chartArea;
        return area && x >= area.left && x <= area.right && y >= area.top && y <= area.bottom;
      };

      const relativeX = clientX => {
        const rect = canvas.getBoundingClientRect();
        return clientX - rect.left;
      };

      const indexFromPixel = pixel => {
        const scale = chart.scales.x;
        if (!scale || !labels.length) return -1;
        const rawIndex = scale.getValueForPixel(pixel);
        const clamped = Math.round(rawIndex);
        return Math.max(0, Math.min(labels.length - 1, clamped));
      };

      const finishSelection = event => {
        if (!state.dragSelection.active) return;
        const endX = relativeX(event.clientX);
        const startX = state.dragSelection.startX;
        const width = Math.abs(endX - startX);
        const left = chart.chartArea.left;
        const right = chart.chartArea.right;
        const startPixel = Math.max(left, Math.min(right, startX));
        const endPixel = Math.max(left, Math.min(right, endX));

        clearDragSelection(chart);

        if (width < 10 || labels.length < 2) return;

        const startIdx = indexFromPixel(Math.min(startPixel, endPixel));
        const endIdx = indexFromPixel(Math.max(startPixel, endPixel));
        if (startIdx < 0 || endIdx < 0 || startIdx === endIdx) return;

        state.view.zoomRange = {
          start: labels[Math.min(startIdx, endIdx)],
          end: labels[Math.max(startIdx, endIdx)]
        };
        renderCharts();
      };

      canvas.onpointerdown = event => {
        if (event.button !== 0 || !chartAreaContains(event.clientX, event.clientY)) return;
        state.dragSelection.active = true;
        state.dragSelection.startX = relativeX(event.clientX);
        state.dragSelection.currentX = state.dragSelection.startX;
        canvas.setPointerCapture?.(event.pointerId);
        chart.draw();
      };

      canvas.onpointermove = event => {
        if (!state.dragSelection.active) return;
        state.dragSelection.currentX = relativeX(event.clientX);
        chart.draw();
      };

      canvas.onpointerup = event => {
        canvas.releasePointerCapture?.(event.pointerId);
        finishSelection(event);
      };

      canvas.onpointercancel = event => {
        canvas.releasePointerCapture?.(event.pointerId);
        clearDragSelection(chart);
      };

      canvas.ondblclick = () => clearZoomRange();
    }

    function renderStats(rows, approxLocEnd) {
      const total = rows.reduce((a, r) => {
        for (const k of numKeys) a[k] += r[k];
        return a;
      }, Object.fromEntries(numKeys.map(k => [k, 0])));

      const cards = [
        ["Commits", total.commits],
        ["Added", total.added_lines],
        ["Removed", total.removed_lines],
        ["Modified", total.modified_lines],
        ["Net", total.net_change_lines],
        ["Approx LOC End", approxLocEnd],
        ["Active Days", new Set(rows.map(r => r.date)).size]
      ];

      document.getElementById("stats").innerHTML = cards.map(([k, v]) =>
        `<article class="stat"><div class="k">${k}</div><div class="v">${fmt.format(v)}</div></article>`
      ).join("");
    }

    function renderCharts() {
      const metric = state.view.metric;
      const selectedRows = state.view.repo === "ALL" ? state.rows : state.rows.filter(r => r.repo === state.view.repo);
      const granularity = pickGranularity(selectedRows, state.view.granularity);
      const allSeries = aggregate(selectedRows, granularity);
      let visibleIndices = allSeries.map((_, index) => index);

      if (state.view.zoomRange) {
        const zoomed = allSeries
          .map((row, index) => ({ row, index }))
          .filter(({ row }) => row.date >= state.view.zoomRange.start && row.date <= state.view.zoomRange.end)
          .map(({ index }) => index);

        if (zoomed.length >= 2) {
          visibleIndices = zoomed;
        } else {
          state.view.zoomRange = null;
        }
      }

      const fullApproxLocSeries = cumulativeApproxLoc(allSeries);
      const series = visibleIndices.map(index => allSeries[index]);
      const approxLocSeries = visibleIndices.map(index => fullApproxLocSeries[index]);
      const approxLocEnd = approxLocSeries.length ? approxLocSeries[approxLocSeries.length - 1] : 0;
      const showApproxOverlay = metric !== "approx_total_loc" && approxLocSeries.some(v => v !== 0);
      updateRangeHint(granularity, series);
      renderStats(series, approxLocEnd);
      const primarySeries = metric === "approx_total_loc" ? approxLocSeries : series.map(r => r[metric]);
      const trendDatasets = [
        {
          label: metricLabel(metric),
          data: primarySeries,
          borderColor: "#00c2a8",
          backgroundColor: "rgba(0,194,168,0.16)",
          fill: true,
          borderWidth: 2,
          pointRadius: 0,
          pointHoverRadius: 6,
          pointHitRadius: 18,
          pointHoverBorderWidth: 3,
          pointHoverBackgroundColor: "#09141f",
          pointHoverBorderColor: "#00c2a8",
          cubicInterpolationMode: "monotone",
          tension: 0.25,
          yAxisID: "y"
        }
      ];

      if (showApproxOverlay) {
        trendDatasets.push({
          label: metricLabel("approx_total_loc"),
          data: approxLocSeries,
          borderColor: "#ffb15e",
          backgroundColor: "rgba(255,177,94,0)",
          fill: false,
          borderWidth: 2,
          borderDash: [6, 4],
          pointRadius: 0,
          pointHoverRadius: 6,
          pointHitRadius: 18,
          pointHoverBorderWidth: 3,
          pointHoverBackgroundColor: "#09141f",
          pointHoverBorderColor: "#ffb15e",
          cubicInterpolationMode: "monotone",
          tension: 0.2,
          yAxisID: "y2"
        });
      }

      const trendCfg = {
        type: "line",
        data: {
          labels: series.map(r => r.date),
          datasets: trendDatasets
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          interaction: {
            mode: "index",
            intersect: false
          },
          plugins: {
            legend: {
              labels: {
                color: "#c5d7e6",
                usePointStyle: true
              }
            },
            tooltip: buildTooltipOptions({ granularity })
          },
          scales: {
            x: { ticks: { color: "#9db3c7", maxTicksLimit: 14 }, grid: { color: "rgba(70,99,124,.26)" } },
            y: {
              min: primarySeries.every(v => v >= 0) ? 0 : undefined,
              ticks: { color: "#9db3c7", callback: v => fmt.format(v) },
              grid: { color: "rgba(70,99,124,.26)" }
            }
          }
        }
      };

      if (showApproxOverlay) {
        trendCfg.options.scales.y2 = {
          position: "right",
          min: approxLocSeries.every(v => v >= 0) ? 0 : undefined,
          ticks: { color: "#f7cb96", callback: v => fmt.format(v) },
          grid: { drawOnChartArea: false }
        };
      }

      if (state.trendChart) state.trendChart.destroy();
      state.trendChart = new Chart(document.getElementById("trendChart"), trendCfg);
      bindTrendZoom(state.trendChart, series.map(r => r.date));

      const byRepo = new Map();
      const repoRows = state.view.zoomRange
        ? state.rows.filter(r => {
            const key = bucketKey(r.date, granularity);
            return key >= state.view.zoomRange.start && key <= state.view.zoomRange.end;
          })
        : state.rows;

      for (const r of repoRows) {
        if (!byRepo.has(r.repo)) byRepo.set(r.repo, 0);
        if (metric === "approx_total_loc") {
          byRepo.set(r.repo, byRepo.get(r.repo) + r.net_change_lines);
        } else {
          byRepo.set(r.repo, byRepo.get(r.repo) + r[metric]);
        }
      }
      const repoPairs = [...byRepo.entries()].sort((a, b) => b[1] - a[1]).slice(0, 12);

      const repoCfg = {
        type: "bar",
        data: {
          labels: repoPairs.map(([r]) => r.replace("https://github.com/", "")),
          datasets: [{
            label: `Total ${metricLabel(metric)}`,
            data: repoPairs.map(([, v]) => v),
            backgroundColor: "rgba(255,122,24,.85)",
            borderRadius: 6,
            hoverBackgroundColor: "#ff9c4a",
            borderSkipped: false
          }]
        },
        options: {
          indexAxis: "y",
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          interaction: {
            mode: "nearest",
            intersect: false
          },
          plugins: {
            legend: {
              labels: {
                color: "#c5d7e6",
                usePointStyle: true
              }
            },
            tooltip: buildTooltipOptions({
              valueAxis: "x",
              titleFormatter: item => item.label
            })
          },
          scales: {
            x: { ticks: { color: "#9db3c7", callback: v => fmt.format(v) }, grid: { color: "rgba(70,99,124,.26)" } },
            y: { ticks: { color: "#c5d7e6" }, grid: { display: false } }
          }
        }
      };

      if (state.repoChart) state.repoChart.destroy();
      state.repoChart = new Chart(document.getElementById("repoChart"), repoCfg);

    }

    function bindControls() {
      const fileInput = document.getElementById("fileInput");
      const fileName = document.getElementById("fileName");
      const pickFileBtn = document.getElementById("pickFileBtn");

      document.getElementById("repoSelect").addEventListener("change", e => { state.view.repo = e.target.value; renderCharts(); });
      document.getElementById("metricSelect").addEventListener("change", e => { state.view.metric = e.target.value; renderCharts(); });
      document.getElementById("granularitySelect").addEventListener("change", e => {
        state.view.granularity = e.target.value;
        state.view.zoomRange = null;
        renderCharts();
      });
      document.getElementById("resetZoom").addEventListener("click", resetTimeRange);
      pickFileBtn.addEventListener("click", () => fileInput.click());
      fileInput.addEventListener("change", async e => {
        const f = e.target.files?.[0];
        if (!f) return;
        fileName.textContent = f.name;
        try {
          state.rows = parseCsv(await f.text());
          state.view.repo = "ALL";
          state.view.zoomRange = null;
          updateRepoOptions();
          renderCharts();
        } catch (err) {
          console.error("CSV parse error:", err);
        }
      });
    }

    async function boot() {
      bindControls();
      try {
        const res = await fetch("./all_repos_daily_stats.csv");
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        state.rows = parseCsv(await res.text());
        state.view.zoomRange = null;
        document.getElementById("fileName").textContent = "all_repos_daily_stats.csv";
        updateRepoOptions();
        renderCharts();
      } catch (_) {
        console.warn("Could not auto-load all_repos_daily_stats.csv. Use the file picker.");
      }
    }

    boot();
  </script>
</body>
</html>
